<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Diário Bíblico</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📖 Ferramenta de Estudos</h1>
        
        <div class="toolbar-botoes">
            <button onclick="gerarFormulario('estudo')">📝 Novo Estudo</button>
            <button onclick="gerarFormulario('devocional')">☕ Novo Devocional</button>
            <button onclick="gerarFormulario('sermao')">🎤 Novo Sermão</button>
        </div>

        <div id="area-formulario" class="card" style="display:none;">
            <input type="text" id="tituloNota" placeholder="Título da Anotação / Referência Principal" />
            <div id="campos-dinamicos"></div>
            
            <div class="acoes">
                <button class="btn-salvar" onclick="salvarNota()">💾 Salvar</button>
                <button class="btn-pdf" onclick="gerarPDF()">📄 Gerar PDF</button>
            </div>
        </div>

        <hr>
        <h2>Histórico</h2>
        <div id="lista-anotacoes"></div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>

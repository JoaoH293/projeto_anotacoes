<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Diário Bíblico Cloud</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <h1>🙏 Diário Bíblico</h1>
        <p>Entre para sincronizar seus estudos</p>
        
        <input type="email" id="email" placeholder="E-mail de acesso">
        <input type="password" id="password" placeholder="Sua senha">
        
        <button class="btn-primary" onclick="handleAuth('login')">Acessar Conta</button>
        <button class="btn-outline" onclick="handleAuth('signup')">Criar nova conta</button>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="logout()" style="background:#e74c3c; padding: 5px 10px;">Sair</button>
            <span id="user-display"></span>
        </div>
        
        <h1>📖 Ferramenta de Estudos</h1>
        
        <div class="toolbar-botoes">
            <button onclick="gerarFormulario('estudo')">📝 Novo Estudo</button>
            <button onclick="gerarFormulario('devocional')">☕ Novo Devocional</button>
            <button onclick="gerarFormulario('sermao')">🎤 Novo Sermão</button>
        </div>

        <div id="area-formulario" class="card" style="display:none;">
            <input type="text" id="tituloNota" placeholder="Título ou Referência" />
            <div id="campos-dinamicos"></div>
            <div class="acoes">
                <button class="btn-salvar" onclick="salvarNota()">💾 Salvar na Nuvem</button>
                <button class="btn-pdf" onclick="gerarPDF()">📄 Gerar PDF</button>
            </div>
        </div>

        <hr>
        <h2>Minhas Anotações Salvas</h2>
        <div id="lista-anotacoes"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyBBfUmjFUv9-mrbVZeGNleRBS19fUwSrr8",
            authDomain: "anotacoesteologicas-5cf2d.firebaseapp.com",
            projectId: "anotacoesteologicas-5cf2d",
            storageBucket: "anotacoesteologicas-5cf2d.firebasestorage.app",
            messagingSenderId: "720666656507",
            appId: "1:720666656507:web:02aa730e22bd705ad67a5e",
            measurementId: "G-21XBSKXW6S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Exportar para o script.js
        window.fb = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, collection, addDoc, query, where, getDocs, doc, updateDoc, deleteDoc, orderBy };
    </script>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="script.js" type="module"></script>
    
    <script>
        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
